<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Status Gradients -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>
    
    <!-- Dropshadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="480" rx="16" fill="url(#bgGrad)" />
  <rect width="1000" height="480" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <!-- Title -->
  <text x="50" y="45" fill="#f9fafb" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" letter-spacing="-0.5">Deterministic Severity Triage Engine</text>
  <text x="50" y="65" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="12">Combining numeric symptom rubrics with critical safety rule overrides</text>

  <!-- STEP 1: Structured Symptom Inputs -->
  <g transform="translate(50, 110)" filter="url(#shadow)">
    <rect width="220" height="300" rx="10" fill="#1e293b" stroke="#374151" stroke-width="1.5" />
    <text x="20" y="30" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" letter-spacing="0.5">SYMPTOM SCORES</text>
    
    <text x="20" y="70" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12">Unconsciousness: <tspan fill="#fb7185" font-weight="bold">+50 pts</tspan></text>
    <text x="20" y="100" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12">Breathing Difficulty: <tspan fill="#fb7185" font-weight="bold">+45 pts</tspan></text>
    <text x="20" y="130" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12">Suspected Cardiac: <tspan fill="#fb7185" font-weight="bold">+40 pts</tspan></text>
    <text x="20" y="160" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12">Severe Bleeding: <tspan fill="#fb7185" font-weight="bold">+30 pts</tspan></text>
    <text x="20" y="190" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12">Head Injury: <tspan fill="#fbbf24" font-weight="bold">+15 pts</tspan></text>
    <text x="20" y="220" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="12">Suspected Fracture: <tspan fill="#34d399" font-weight="bold">+10 pts</tspan></text>
    
    <rect x="20" y="245" width="180" height="1" fill="#334155" />
    <text x="20" y="270" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Total points are summed</text>
    <text x="20" y="285" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">to form baseline score.</text>
  </g>

  <!-- Flow 1 -->
  <path d="M 270 260 L 360 260" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STEP 2: Critical Overrides Logic Box -->
  <g transform="translate(360, 110)" filter="url(#shadow)">
    <rect width="260" height="300" rx="10" fill="#1e293b" stroke="#f43f5e" stroke-width="1.5" />
    <text x="20" y="30" fill="#f43f5e" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold" letter-spacing="0.5">CRITICAL SAFETY OVERRIDES</text>
    
    <g transform="translate(15, 60)">
      <rect width="230" height="60" rx="6" fill="#111827" stroke="#334155" />
      <text x="15" y="23" fill="#fb7185" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">Rule 1: Cardiopulmonary Override</text>
      <text x="15" y="42" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Unconsciousness + Breathing Difficulty</text>
      <text x="15" y="52" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">→ Force CRITICAL (Score: 100)</text>
    </g>

    <g transform="translate(15, 135)">
      <rect width="230" height="60" rx="6" fill="#111827" stroke="#334155" />
      <text x="15" y="23" fill="#fb7185" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">Rule 2: Cardiac Override</text>
      <text x="15" y="42" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Suspected Cardiac + chest pain symptoms</text>
      <text x="15" y="52" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">→ Force CRITICAL (Score: 100)</text>
    </g>

    <g transform="translate(15, 210)">
      <rect width="230" height="65" rx="6" fill="#111827" stroke="#334155" />
      <text x="15" y="23" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">Rule 3: Vulnerable Patient Override</text>
      <text x="15" y="42" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Age &lt; 5 or &gt; 65 with active symptoms</text>
      <text x="15" y="52" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">→ Upgrade Standard to URGENT (+20 pts)</text>
    </g>
  </g>

  <!-- Flow 2 -->
  <path d="M 620 260 L 710 260" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STEP 3: Classification Output Nodes -->
  <g transform="translate(710, 110)">
    <!-- CRITICAL Node -->
    <g transform="translate(0, 10)" filter="url(#shadow)">
      <rect width="240" height="70" rx="8" fill="url(#redGrad)" />
      <text x="20" y="30" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">CRITICAL</text>
      <text x="20" y="50" fill="#ffe4e6" font-family="Inter, system-ui, sans-serif" font-size="11">Rule override triggered or Score &gt;= 75</text>
    </g>

    <!-- URGENT Node -->
    <g transform="translate(0, 100)" filter="url(#shadow)">
      <rect width="240" height="70" rx="8" fill="url(#yellowGrad)" />
      <text x="20" y="30" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">URGENT</text>
      <text x="20" y="50" fill="#fef3c7" font-family="Inter, system-ui, sans-serif" font-size="11">Total Score: 30 to 74 points</text>
    </g>

    <!-- STANDARD Node -->
    <g transform="translate(0, 190)" filter="url(#shadow)">
      <rect width="240" height="70" rx="8" fill="url(#greenGrad)" />
      <text x="20" y="30" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">STANDARD</text>
      <text x="20" y="50" fill="#d1fae5" font-family="Inter, system-ui, sans-serif" font-size="11">Total Score: &lt; 30 points</text>
    </g>
  </g>

  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
  </defs>
</svg>
