<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Component Gradients -->
    <linearGradient id="callerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="dashboardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <!-- Dropshadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="480" rx="16" fill="url(#bgGrad)" />
  <rect width="1000" height="480" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <!-- Title -->
  <text x="50" y="45" fill="#f9fafb" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" letter-spacing="-0.5">Real-Time WebSocket Event Brokerage</text>
  <text x="50" y="65" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="12">Bi-directional connection state and ingestion-to-broadcast loop</text>

  <!-- CALLER CLIENT (Ingestion Trigger) -->
  <g transform="translate(60, 150)" filter="url(#shadow)">
    <rect width="200" height="200" rx="10" fill="url(#callerGrad)" />
    <text x="20" y="35" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">Caller Portal</text>
    <text x="20" y="55" fill="#e0f2fe" font-family="Inter, system-ui, sans-serif" font-size="11">Initiates Emergency Request</text>
    <rect x="20" y="70" width="160" height="1" fill="#bae6fd" opacity="0.3" />
    
    <text x="20" y="95" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">1. REST POST Request</text>
    <text x="20" y="115" fill="#e0f2fe" font-family="Inter, system-ui, sans-serif" font-size="11">Audio wave file + GPS details</text>
    
    <text x="20" y="145" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">2. Receives HTTP 200</text>
    <text x="20" y="165" fill="#e0f2fe" font-family="Inter, system-ui, sans-serif" font-size="11">Verification confirmation</text>
  </g>

  <!-- FASTAPI BACKEND (Connection Hub) -->
  <g transform="translate(370, 110)" filter="url(#shadow)">
    <rect width="260" height="300" rx="10" fill="url(#serverGrad)" />
    <text x="20" y="35" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">FastAPI Connection Mgr</text>
    <text x="20" y="55" fill="#d1fae5" font-family="Inter, system-ui, sans-serif" font-size="11">Manages Active WS Subscriptions</text>
    <rect x="20" y="70" width="220" height="1" fill="#a7f3d0" opacity="0.3" />

    <g transform="translate(15, 85)">
      <rect width="230" height="55" rx="6" fill="#047857" />
      <text x="15" y="22" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">WebSocket Endpoint</text>
      <text x="15" y="40" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="10">ws_router at /api/v1/incidents/live</text>
    </g>

    <g transform="translate(15, 155)">
      <rect width="230" height="55" rx="6" fill="#047857" />
      <text x="15" y="22" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">Connection Store</text>
      <text x="15" y="40" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="10">List of active WebSocket connections</text>
    </g>

    <g transform="translate(15, 225)">
      <rect width="230" height="55" rx="6" fill="#047857" />
      <text x="15" y="22" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold">Broadcast Engine</text>
      <text x="15" y="40" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="10">Iterate connections to push json payload</text>
    </g>
  </g>

  <!-- RESPONDER CLIENT (Real-Time Render) -->
  <g transform="translate(740, 150)" filter="url(#shadow)">
    <rect width="200" height="200" rx="10" fill="url(#dashboardGrad)" />
    <text x="20" y="35" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">Responder Dashboard</text>
    <text x="20" y="55" fill="#f3e8ff" font-family="Inter, system-ui, sans-serif" font-size="11">Maintains Listening Connection</text>
    <rect x="20" y="70" width="160" height="1" fill="#e9d5ff" opacity="0.3" />

    <text x="20" y="95" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">1. WS Handshake</text>
    <text x="20" y="115" fill="#f3e8ff" font-family="Inter, system-ui, sans-serif" font-size="11">Dynamic wss:// connection setup</text>
    
    <text x="20" y="145" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">2. Broadcast Reception</text>
    <text x="20" y="165" fill="#f3e8ff" font-family="Inter, system-ui, sans-serif" font-size="11">Slides-in card + plays alert sound</text>
  </g>

  <!-- FLOW CONNECTIONS -->
  
  <!-- Caller -> Backend (REST POST) -->
  <path d="M 260 220 L 370 220" stroke="#38bdf8" stroke-width="2.5" fill="none" marker-end="url(#arrow)" />
  <text x="280" y="210" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="10">HTTP POST</text>
  
  <!-- Backend -> Caller (REST HTTP 200) -->
  <path d="M 370 245 L 260 245" stroke="#34d399" stroke-width="2.5" stroke-dasharray="4,4" fill="none" />
  
  <!-- Dashboard -> Backend (Handshake) -->
  <path d="M 740 220 L 630 220" stroke="#a78bfa" stroke-width="2.5" fill="none" marker-end="url(#arrow)" />
  <text x="655" y="210" fill="#a78bfa" font-family="Inter, system-ui, sans-serif" font-size="10">wss:// handshake</text>
  
  <!-- Backend -> Dashboard (WebSocket Broadcast) -->
  <path d="M 630 245 L 740 245" stroke="#f43f5e" stroke-width="3" fill="none" marker-end="url(#arrow)" />
  <text x="645" y="270" fill="#f43f5e" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="bold">Real-time Frame</text>

  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#34d399" />
    </marker>
  </defs>
</svg>
