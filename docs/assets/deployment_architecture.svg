<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Service Box Gradients -->
    <linearGradient id="vercelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="renderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <linearGradient id="googleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
    
    <!-- Dropshadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="480" rx="16" fill="url(#bgGrad)" />
  <rect width="1000" height="480" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <!-- Title -->
  <text x="50" y="45" fill="#f9fafb" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" letter-spacing="-0.5">Production Deployment Architecture</text>
  <text x="50" y="65" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="12">Cloud infrastructure mapping for high-availability real-time emergency services</text>

  <!-- USER BROWSER -->
  <g transform="translate(50, 150)" filter="url(#shadow)">
    <rect width="180" height="240" rx="10" fill="#1f2937" stroke="#4b5563" stroke-width="1.5" />
    <text x="20" y="30" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">USER SIDE</text>
    
    <g transform="translate(15, 60)">
      <rect width="150" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1" />
      <text x="15" y="25" fill="#f9fafb" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">Caller Web View</text>
      <text x="15" y="43" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="10">Chrome/Safari/Mobile</text>
    </g>

    <g transform="translate(15, 140)">
      <rect width="150" height="60" rx="6" fill="#111827" stroke="#374151" stroke-width="1" />
      <text x="15" y="25" fill="#f9fafb" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">Responder Dashboard</text>
      <text x="15" y="43" fill="#6b7280" font-family="Inter, system-ui, sans-serif" font-size="10">Edge Browser Console</text>
    </g>
  </g>

  <!-- VERCEL CDN -->
  <g transform="translate(380, 100)" filter="url(#shadow)">
    <rect width="220" height="150" rx="10" fill="url(#vercelGrad)" stroke="#f3f4f6" stroke-width="1.5" />
    <text x="20" y="30" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">▲ Vercel Cloud</text>
    <text x="20" y="50" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="11">Frontend Hosting (Edge CDN)</text>
    <rect x="20" y="65" width="180" height="1" fill="#374151" />
    
    <text x="20" y="85" fill="#d1d5db" font-family="Inter, system-ui, sans-serif" font-size="11">✓ Static Next.js compilation</text>
    <text x="20" y="105" fill="#d1d5db" font-family="Inter, system-ui, sans-serif" font-size="11">✓ Auto SSL, Edge Caching</text>
    <text x="20" y="125" fill="#a7f3d0" font-family="Inter, system-ui, sans-serif" font-size="11">Live: ls-ai-six.vercel.app</text>
  </g>

  <!-- RENDER APPLICATION CLOUD -->
  <g transform="translate(380, 280)" filter="url(#shadow)">
    <rect width="220" height="160" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5" />
    <text x="20" y="30" fill="#3b82f6" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="bold">Render Cloud</text>
    <text x="20" y="50" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">FastAPI Backend (Docker WebSrv)</text>
    <rect x="20" y="65" width="180" height="1" fill="#334155" />
    
    <text x="20" y="85" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11">✓ Uvicorn Server on port 10000</text>
    <text x="20" y="105" fill="#cbd5e1" font-family="Inter, system-ui, sans-serif" font-size="11">✓ Persistent WS connections</text>
    <text x="20" y="125" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="11">Live: ls-ailifesaver-backend...</text>
  </g>

  <!-- EXTERNAL SAAS APIS -->
  <g transform="translate(730, 150)" filter="url(#shadow)">
    <rect width="220" height="240" rx="10" fill="#111827" stroke="#10b981" stroke-width="1.5" />
    <text x="20" y="30" fill="#10b981" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">EXTERNAL APIS</text>
    
    <g transform="translate(15, 60)">
      <rect width="190" height="60" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1" />
      <text x="15" y="25" fill="#fde68a" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">Google AI Studio</text>
      <text x="15" y="43" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="10">Gemini 3.5 Flash API</text>
    </g>

    <g transform="translate(15, 140)">
      <rect width="190" height="60" rx="6" fill="#1f2937" stroke="#374151" stroke-width="1" />
      <text x="15" y="25" fill="#c084fc" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="bold">OpenAI Cloud</text>
      <text x="15" y="43" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="10">Whisper Audio transcription</text>
    </g>
  </g>

  <!-- CONNECTORS -->
  
  <!-- Browser -> Vercel (HTTPS GET) -->
  <path d="M 230 180 L 380 180" stroke="#f3f4f6" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="260" y="170" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="10">Loads App (HTML/JS)</text>
  
  <!-- Browser -> Render (REST API POST) -->
  <path d="M 230 220 L 380 320" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  <text x="250" y="270" fill="#93c5fd" font-family="Inter, system-ui, sans-serif" font-size="10">POST API / WS</text>

  <!-- Vercel -> Render (Dynamic Backend Calls) -->
  <path d="M 490 250 L 490 280" stroke="#38bdf8" stroke-width="2" fill="none" stroke-dasharray="4,4" />

  <!-- Render -> External APIs -->
  <path d="M 600 360 L 730 360" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrow)" />
  <path d="M 600 340 L 730 240" stroke="#10b981" stroke-width="2.5" fill="none" marker-end="url(#arrow)" />

  <!-- Arrow Definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3b82f6" />
    </marker>
  </defs>
</svg>
