<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Box Gradients -->
    <linearGradient id="glowBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="glowPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <linearGradient id="glowYellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <linearGradient id="glowRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185" />
      <stop offset="100%" stop-color="#e11d48" />
    </linearGradient>

    <!-- Dropshadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="320" rx="16" fill="url(#bgGrad)" />
  <rect width="1000" height="320" rx="16" fill="none" stroke="#1f2937" stroke-width="2" />

  <!-- Title -->
  <text x="50" y="45" fill="#f9fafb" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="bold" letter-spacing="-0.5">Pipeline Data Flow &amp; Parsing Sequence</text>
  <text x="50" y="65" fill="#9ca3af" font-family="Inter, system-ui, sans-serif" font-size="12">Horizontal breakdown of the data ingestion and transformation phases</text>

  <!-- STAGE 1: Audio / Text Ingest -->
  <g transform="translate(50, 100)" filter="url(#shadow)">
    <rect width="115" height="120" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="1.5" />
    <text x="15" y="30" fill="#38bdf8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">STAGE 1</text>
    <text x="15" y="55" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">Audio / Text</text>
    <text x="15" y="75" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Raw Speech</text>
    <text x="15" y="90" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Input (WAV/Fallback)</text>
  </g>

  <!-- Flow Connector 1 -->
  <path d="M 165 160 L 195 160" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STAGE 2: Speech to Text (Whisper) -->
  <g transform="translate(195, 100)" filter="url(#shadow)">
    <rect width="130" height="120" rx="8" fill="#1e293b" stroke="#c084fc" stroke-width="1.5" />
    <text x="15" y="30" fill="#c084fc" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">STAGE 2 (AI)</text>
    <text x="15" y="55" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">Whisper ASR</text>
    <text x="15" y="75" fill="#c084fc" font-family="Inter, system-ui, sans-serif" font-size="11">Auto Translation</text>
    <text x="15" y="90" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Translates Telugu</text>
    <text x="15" y="105" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">speech to English</text>
  </g>

  <!-- Flow Connector 2 -->
  <path d="M 325 160 L 355 160" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STAGE 3: Parser (Gemini API) -->
  <g transform="translate(355, 100)" filter="url(#shadow)">
    <rect width="130" height="120" rx="8" fill="#1e293b" stroke="#fbbf24" stroke-width="1.5" />
    <text x="15" y="30" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">STAGE 3 (AI)</text>
    <text x="15" y="55" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">Gemini API</text>
    <text x="15" y="75" fill="#fbbf24" font-family="Inter, system-ui, sans-serif" font-size="11">Context Parser</text>
    <text x="15" y="90" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Extracts structured</text>
    <text x="15" y="105" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">boolean Pydantic facts</text>
  </g>

  <!-- Flow Connector 3 -->
  <path d="M 485 160 L 515 160" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STAGE 4: Severity Engine (Python) -->
  <g transform="translate(515, 100)" filter="url(#shadow)">
    <rect width="135" height="120" rx="8" fill="#1e293b" stroke="#fb7185" stroke-width="1.5" />
    <text x="15" y="30" fill="#fb7185" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">STAGE 4 (RULES)</text>
    <text x="15" y="55" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">Severity Triage</text>
    <text x="15" y="75" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Deterministic Rubric</text>
    <text x="15" y="90" fill="#ffe4e6" font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="bold">Critical Overrides</text>
    <text x="15" y="105" fill="#ffe4e6" font-family="Inter, system-ui, sans-serif" font-size="10">Calculates Score</text>
  </g>

  <!-- Flow Connector 4 -->
  <path d="M 650 160 L 680 160" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STAGE 5: WebSockets Server -->
  <g transform="translate(680, 100)" filter="url(#shadow)">
    <rect width="115" height="120" rx="8" fill="#1e293b" stroke="#c084fc" stroke-width="1.5" />
    <text x="15" y="30" fill="#c084fc" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">STAGE 5</text>
    <text x="15" y="55" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">WS Router</text>
    <text x="15" y="75" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="11">Broadcaster Hub</text>
    <text x="15" y="95" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Pushes payload to</text>
    <text x="15" y="108" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">listening dashboards</text>
  </g>

  <!-- Flow Connector 5 -->
  <path d="M 795 160 L 825 160" stroke="#475569" stroke-width="3" fill="none" marker-end="url(#arrow)" />

  <!-- STAGE 6: Live Dashboard -->
  <g transform="translate(825, 100)" filter="url(#shadow)">
    <rect width="125" height="120" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1.5" />
    <text x="15" y="30" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">STAGE 6</text>
    <text x="15" y="55" fill="#f8fafc" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="bold">Dashboard</text>
    <text x="15" y="75" fill="#34d399" font-family="Inter, system-ui, sans-serif" font-size="11">Real-time Alert</text>
    <text x="15" y="90" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">Renders incident</text>
    <text x="15" y="103" fill="#94a3b8" font-family="Inter, system-ui, sans-serif" font-size="10">card + alerts crew</text>
  </g>

  <!-- Arrow Marker Definition -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#475569" />
    </marker>
  </defs>
</svg>
